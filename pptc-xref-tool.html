<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPTC Cross Reference Tool – SCHURTER</title>
<style>
  :root {
    --s-blue-dark: #1c3664;
    --s-blue-mid: #1a5276;
    --s-blue-light: #2e86c1;
    --s-blue-pale: #d6eaf8;
    --s-bg: #f4f6f8;
    --s-white: #ffffff;
    --s-border: #d0d7e0;
    --s-text: #1a1a2e;
    --s-muted: #6b7c93;
    --s-green: #1e8449;
    --s-green-pale: #d5f5e3;
    --s-red: #c0392b;
    --radius: 4px;
    --radius-card: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--s-bg);
    color: var(--s-text);
    min-height: 100vh;
  }

  header {
    background: var(--s-blue-dark);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header .logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: white;
  }

  header .title {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    margin-left: 8px;
    border-left: 1px solid rgba(255,255,255,0.25);
    padding-left: 16px;
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .search-card {
    background: white;
    border-radius: var(--radius-card);
    padding: 28px 32px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }

  .search-card h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--s-blue-dark);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .search-row .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 200px;
  }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--s-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  input[type="text"] {
    border: 1px solid var(--s-border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--s-text);
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--s-blue-light);
    box-shadow: 0 0 0 3px rgba(46,134,193,0.12);
  }

  select {
    border: 1px solid var(--s-border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--s-text);
    background: white;
    cursor: pointer;
    width: 100%;
  }

  select:focus {
    outline: none;
    border-color: var(--s-blue-light);
  }

  .btn {
    background: var(--s-blue-dark);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 9px 20px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    height: 38px;
  }

  .btn:hover { background: var(--s-blue-mid); }

  .btn-clear {
    background: transparent;
    color: var(--s-muted);
    border: 1px solid var(--s-border);
  }

  .btn-clear:hover { background: var(--s-bg); color: var(--s-text); }

  .results-count {
    font-size: 13px;
    color: var(--s-muted);
    margin-bottom: 12px;
  }

  .results-count strong { color: var(--s-blue-dark); }

  .no-results {
    background: white;
    border-radius: var(--radius-card);
    padding: 40px;
    text-align: center;
    color: var(--s-muted);
    font-size: 14px;
  }

  /* Result cards */
  .result-card {
    background: white;
    border-radius: var(--radius-card);
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .result-card .card-header {
    background: var(--s-blue-dark);
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .card-header .schurter-pn {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .card-header .series-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .card-header .links {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .card-header a {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    padding: 3px 10px;
    transition: background 0.15s;
  }

  .card-header a:hover { background: rgba(255,255,255,0.15); color: white; }

  .card-body {
    padding: 16px 20px;
  }

  .equiv-banner {
    background: var(--s-green-pale);
    border: 1px solid #a9dfbf;
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 13px;
    color: var(--s-green);
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .xref-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .xref-item {
    border: 1px solid var(--s-border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .xref-item .supplier {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--s-muted);
    margin-bottom: 4px;
  }

  .xref-item .part-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--s-text);
    word-break: break-all;
  }

  .xref-item .part-num.na {
    color: #bdc3c7;
    font-weight: 400;
    font-style: italic;
    font-size: 12px;
  }

  .xref-item.highlight {
    background: var(--s-blue-pale);
    border-color: var(--s-blue-light);
  }

  .xref-item.highlight .supplier { color: var(--s-blue-mid); }
  .xref-item.highlight .part-num { color: var(--s-blue-dark); }

  .match-indicator {
    display: inline-block;
    background: #fef9e7;
    border: 1px solid #f9e79f;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    color: #d68910;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .supplier-tag {
    display: inline-block;
    background: var(--s-blue-pale);
    color: var(--s-blue-dark);
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<header>
  <span class="logo-text">SCHURTER</span>
  <span class="title">PPTC Cross Reference Tool</span>
</header>

<div class="main">

    <div class="search-row">

      </div>
      <div class="field" style="max-width:200px;">
        <label>Filter by Series</label>

      </div>
      <button class="btn" onclick="doSearch()">Search</button>
      <button class="btn btn-clear" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <div id="resultsCount" class="results-count" style="display:none;"></div>
  <div id="results"></div>

</div>

// Populate series filter
const seriesFilter = document.getElementById('seriesFilter');
const allSeries = [...new Set(DATA.map(r => r.series))];
allSeries.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s;
  opt.textContent = s;
  seriesFilter.appendChild(opt);
});

// Search on Enter
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function normalize(str) {
  return str.toLowerCase().replace(/[\s\-\.\/]/g, '');
}

function doSearch() {
  const q = normalize(document.getElementById('searchInput').value.trim());
  const series = document.getElementById('seriesFilter').value;
  const container = document.getElementById('results');
  const countEl = document.getElementById('resultsCount');

  if (!q && !series) {
    container.innerHTML = '';
    countEl.style.display = 'none';
    return;
  }

  let matches = DATA.filter(row => {
    if (series && row.series !== series) return false;
    if (!q) return true;
    return SUPPLIERS.some(sup => {
      const val = row[sup] || '';
      return val !== '—' && normalize(val).includes(q);
    });
  });

  countEl.style.display = 'block';

  if (matches.length === 0) {
    countEl.innerHTML = '';
    container.innerHTML = `<div class="no-results">No results found for "<strong>${escHtml(document.getElementById('searchInput').value)}</strong>"</div>`;
    return;
  }

  countEl.innerHTML = `<strong>${matches.length}</strong> result${matches.length !== 1 ? 's' : ''} found`;
  container.innerHTML = matches.map(row => renderCard(row, q)).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('seriesFilter').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('resultsCount').style.display = 'none';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderCard(row, q) {
  const pn = row['Schurter PN'];
  const equiv = row['Schurter Equivalent'];

  let equivBanner = '';
  if (equiv && equiv !== '—' && equiv !== '') {
    equivBanner = `<div class="equiv-banner">&#9654; Schurter Equivalent: <strong>${escHtml(equiv)}</strong></div>`;
  }

  const items = SUPPLIERS.map(sup => {
    const val = row[sup] || '';
    const isNA = !val || val === '—' || val === '';
    const isSchurter = sup === 'Schurter PN' || sup === 'Schurter Equivalent';
    const isMatch = q && !isNA && normalize(val).includes(q);

    if (sup === 'Schurter Equivalent') return ''; // shown in banner

    return `<div class="xref-item${isSchurter ? ' highlight' : ''}">
      <div class="supplier">${escHtml(SUPPLIER_LABELS[sup])}${isMatch ? '<span class="match-indicator">MATCH</span>' : ''}</div>
      <div class="part-num${isNA ? ' na' : ''}">${isNA ? 'n/a' : escHtml(val)}</div>
    </div>`;
  }).join('');

  return `<div class="result-card">
    <div class="card-header">
      <span class="schurter-pn">${escHtml(pn)}</span>
      <span class="series-badge">${escHtml(row.series)}</span>
      <div class="links">
        <a href="https://www.schurter.com/en/datasheet/${encodeURIComponent(pn)}" target="_blank">Datasheet</a>
        <a href="https://www.schurter.com/en/search?q=${encodeURIComponent(pn)}" target="_blank">Product Page</a>
      </div>
    </div>
    <div class="card-body">
      ${equivBanner}
      <div class="xref-grid">${items}</div>
    </div>
  </div>`;
}
